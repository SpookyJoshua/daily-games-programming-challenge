<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <meta
        name="description"
        content="A new interview-style games programming challenge every day."
    >
    <title>Daily Games Programming Challenge</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <main class="site-shell">
        <header class="hero">
            <p class="eyebrow">Daily practice</p>
            <h1>Games Programming Challenge</h1>
            <p class="hero-copy">
                One globally shared interview-style challenge is published
                every day. Choose a language, build a solution, and submit it
                to the matching GitHub folder.
            </p>
        </header>

        <section
            class="current-challenge"
            id="current-challenge"
            aria-live="polite"
        >
            <p>Loading today's challenge...</p>
        </section>

        <section class="archive-section">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Challenge archive</p>
                    <h2>Previous challenges</h2>
                </div>

                <label class="search-field">
                    <span>Search</span>
                    <input
                        id="challenge-search"
                        type="search"
                        placeholder="Inventory, AI, pathfinding..."
                    >
                </label>
            </div>

            <div
                class="archive-grid"
                id="challenge-archive"
                aria-live="polite"
            ></div>
        </section>
    </main>
</body>
</html>
