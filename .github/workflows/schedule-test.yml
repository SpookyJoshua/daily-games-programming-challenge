name: Schedule Trigger Test

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  test-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Confirm scheduled trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC time: $(date -u)"
