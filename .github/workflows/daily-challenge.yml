name: Generate Daily Challenge

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Optional challenge date in YYYY-MM-DD format"
        required: false
        type: string
  schedule:
    - cron: "*/5 * * * *"
      timezone: "Europe/London"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-challenge-pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Generate challenge
        shell: bash
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            node scripts/generate-challenge.mjs --date="${{ inputs.date }}"
          else
            node scripts/generate-challenge.mjs
          fi

      - name: Commit generated challenge
        shell: bash
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No repository changes were generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add challenges docs/api docs/challenges
          git commit -m "Add daily challenge $(date +'%Y-%m-%d')"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: generate
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
